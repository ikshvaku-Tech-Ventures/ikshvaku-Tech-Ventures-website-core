<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ikshvaku Tech Ventures incubates, accelerates, and invests in breakthrough solutions across Deep Tech, AI, and Sustainable Systems." />
    <title>Ikshvaku Tech Ventures | Pioneering Future Foundations</title>
    <meta name="color-scheme" content="light dark">
    <script>
      {
        const colorScheme = localStorage.getItem("color-scheme");
        if (colorScheme) {
          document.documentElement.setAttribute('data-theme', colorScheme);
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
